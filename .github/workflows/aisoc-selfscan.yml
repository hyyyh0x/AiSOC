name: AiSOC self-scan (dogfood)

# Dogfoods packages/aisoc-action on the AiSOC repo itself: triage our own
# Dependabot / CodeQL / secret-scanning alerts. On PRs it posts a triage
# comment; weekly it refreshes a security-posture digest issue. This is both a
# real check and living proof the Action works.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/aisoc-action/**'
      - '.github/workflows/aisoc-selfscan.yml'
  schedule:
    - cron: '17 13 * * 1' # Mondays 13:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  pull-requests: write
  issues: write

concurrency:
  group: aisoc-selfscan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Triage security signals
        uses: ./packages/aisoc-action
        with:
          mode: ${{ github.event_name == 'schedule' && 'digest' || 'pr-comment' }}
          min-severity: low
          # Non-blocking: this is informational triage, not a hard gate.
          fail-on: none
