name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  # Keyless cosign signing + SLSA provenance attestation need an OIDC token.
  id-token: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CLEAN="${VERSION#v}"
          BODY=$(awk "/^## \[${CLEAN}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Reproducible source tarball — excludes the .git directory but keeps
      # everything a user needs to build / inspect the release contents
      # offline.
      - name: Build source tarball
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.VERSION }}"
          git archive --format=tar.gz \
            --prefix="aisoc-${VERSION#v}/" \
            -o "dist/aisoc-${VERSION}-source.tar.gz" \
            "$GITHUB_REF_NAME"

      # SBOM (SPDX 2.3 JSON) so downstream users can vet what's in the
      # release without re-running their own scanners.
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/aisoc-sbom-${{ steps.version.outputs.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Checksums for every file in dist/ — both SHA-256 and SHA-512 so we
      # cover both common verification preferences.
      - name: Compute checksums
        working-directory: dist
        run: |
          : > checksums.txt
          for f in *; do
            if [ "$f" = "checksums.txt" ]; then continue; fi
            sha256sum "$f" >> checksums.txt
            sha512sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: "AiSOC ${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/aisoc-${{ steps.version.outputs.VERSION }}-source.tar.gz
            dist/aisoc-sbom-${{ steps.version.outputs.VERSION }}.spdx.json
            dist/checksums.txt

  # Build & push Docker images
  #
  # Most services build from their own service directory. The `web` app is
  # special: its Dockerfile copies workspace packages and pnpm config from the
  # monorepo root, so its build context must be `.` (the repo root) with the
  # Dockerfile path explicitly set.
  #
  # The matrix here must stay aligned with publish-images.yml — every service
  # whose `:main` / `:latest` tag is published on push-to-main also needs a
  # pinned `:vX.Y.Z` tag on release, so users who set `AISOC_VERSION=vX.Y.Z`
  # in their .env get a reproducible deploy across the full stack.
  docker-push:
    name: Docker — Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Demo-stack images (pulled by `pnpm aisoc:demo`).
          - service: api
            context: services/api
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-core-api
          - service: agents
            context: services/agents
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-agents
          - service: realtime
            context: services/realtime
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-realtime
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/beenuar/aisoc-web

          # Full-stack backend images (pulled by `docker compose up -d` with
          # `pull_policy: missing` when AISOC_VERSION is pinned).
          - service: ingest
            context: services/ingest
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-ingest
          - service: enrichment
            context: services/enrichment
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-enrichment
          - service: fusion
            context: services/fusion
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-fusion
          - service: actions
            context: services/actions
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-actions
          - service: connectors
            context: services/connectors
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-connectors
          - service: threatintel
            context: services/threatintel
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-threatintel
          - service: ueba
            context: services/ueba
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-ueba
          - service: slack-bot
            context: services/slack-bot
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-slack-bot
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Web image needs NEXT_PUBLIC_DEMO_* flags baked in at build time so the
      # released ghcr.io/beenuar/aisoc-web:vX.Y.Z image (used by AISOC_VERSION
      # pinning) ships a bundle that knows it's a demo. Mirrors the same step
      # in publish-images.yml. Other images gate demo behavior at runtime via
      # AISOC_DEMO_MODE so they don't need build args.
      - id: web-build-args
        if: matrix.service == 'web'
        run: |
          {
            echo 'build_args<<EOF'
            echo 'NEXT_PUBLIC_DEMO_MODE=true'
            echo 'NEXT_PUBLIC_DEMO_DEEPLINK=/cases/INC-RT-001?tab=ledger'
            echo 'NEXT_PUBLIC_DEMO_BANNER=Demo data resets daily at 00:00 UTC. All write actions are disabled.'
            echo 'NEXT_PUBLIC_DEMO_AUTOLOGIN_EMAIL=demo@tryaisoc.com'
            echo 'NEXT_PUBLIC_DEMO_AUTOLOGIN_PASSWORD=aisoc-demo'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
          build-args: ${{ steps.web-build-args.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64
          # SLSA provenance + SPDX SBOM attached to the image by BuildKit.
          provenance: mode=max
          sbom: true

      # ── Supply-chain attestation (mirrors publish-images.yml) ────────────
      # Keyless cosign signature + CycloneDX SBOM attestation per released
      # image. Verification commands: docs/operations/verifying-releases.md.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.18.1

      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ matrix.image }}@${DIGEST}"

      - name: Attach CycloneDX SBOM attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${{ matrix.image }}@${DIGEST}" -o cyclonedx-json > /tmp/sbom.cdx.json
          cosign attest --yes \
            --type cyclonedx \
            --predicate /tmp/sbom.cdx.json \
            "${{ matrix.image }}@${DIGEST}"
