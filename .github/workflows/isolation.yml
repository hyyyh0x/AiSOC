name: Tenant Isolation

# Phase 1.3: cross-store tenant-isolation gate. The offline layer asserts every
# datastore read path constructs a tenant scope (a search as tenant A can never
# include tenant B). The live-container replay lands with Phase 3's integration
# tier. Table-driven (tests/isolation/stores.py) so a new store cannot ship
# without an isolation entry.

on:
  push:
    branches: [main, develop]
    paths:
      - "tests/isolation/**"
      - "services/threatintel/app/storage/qdrant.py"
  pull_request:
    paths:
      - "tests/isolation/**"
      - "services/threatintel/app/storage/qdrant.py"

jobs:
  isolation:
    name: Cross-store tenant isolation (offline)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet qdrant-client structlog pytest pytest-asyncio

      - name: Run isolation suite
        run: python -m pytest tests/isolation -v --tb=short
