name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 03:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python, go]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # `plans/cyble-aisoc/` is a historical-spec mirror of the (private)
          # AISOC-Cyble repository, kept for open-source provenance. Its
          # `platform/` Python prototype was superseded by the canonical
          # implementation under `services/` and is not a deployed artifact;
          # CodeQL findings there would be noise, not actionable security
          # issues.
          config: |
            paths-ignore:
              - 'plans/cyble-aisoc/**'

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: '/language:${{ matrix.language }}'
