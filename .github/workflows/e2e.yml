# Phase 4.8 — buyer-journey end-to-end test for the console.
#
# Walks the canonical analyst flow that every demo / sales conversation
# leans on:
#
#   /alerts → (switch to alert grid) → (click row → Investigation Rail) →
#   /alerts/<id> → /playbooks → (open Run History tab) → /playbooks/new
#
# The spec stubs every backend call via Playwright's network interception
# (`page.route()`) so the suite is fully hermetic: the only thing it
# needs is a Next dev server. We boot that as a `webServer` block in
# `apps/web/playwright.config.ts` (project = `journey`).
#
# This workflow runs on every PR that touches the console, the package
# manifest, or the workflow itself. Failures upload the Playwright HTML
# report + traces / screenshots so reviewers can scrub the regression
# inline on the PR.

name: e2e

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/types/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/types/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buyer-journey:
    name: Buyer journey
    runs-on: ubuntu-latest
    # Same pinned Playwright image as the visual suite so the Chromium
    # build is stable. The image already ships pnpm + Node 22 but we
    # still re-export the same setup steps so the matrix is uniform.
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-jammy
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        # Deliberately kept on action-setup@v4 while the rest of the
        # repo moves to v6. This job runs inside the Playwright
        # container image, which ships a global pnpm 11.x. Under
        # action-setup@v6 pnpm self-switches from 11.x down to the
        # packageManager pin (8.15.1); that churn leaves optional
        # native bindings (@tailwindcss/oxide-linux-x64-gnu) unlinked
        # in the restored store, so the Next.js dev server crashes with
        # "Cannot find native binding" and the journey fails. v4
        # installs 8.15.1 directly with no switch. Pinning `version:`
        # under v6 does NOT help (the container's global pnpm still
        # triggers the switch), so keep v4 here until the upstream
        # pnpm store / optional-dep interaction is resolved.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser binaries
        # The base image ships Playwright 1.49's bundled browsers, but
        # `apps/web` resolves `@playwright/test` up the `^1.49.0` semver
        # range (currently 1.61.x) which expects a different chromium
        # revision (`chromium_headless_shell-1228+`). Without an
        # explicit install step the run fails with `Executable doesn't
        # exist at /ms-playwright/chromium_headless_shell-1228/...`.
        # Install only chromium to keep the download small — the
        # journey spec uses the desktop-chromium project only.
        run: pnpm exec playwright install chromium

      - name: Run buyer-journey E2E
        run: pnpm e2e
        env:
          CI: "true"
          # The journey spec hits its own stubbed Next dev server on
          # 3100, so make sure no proxy is fronting localhost.
          NO_PROXY: "127.0.0.1,localhost"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-playwright-report
          path: apps/web/playwright-report
          retention-days: 14

      - name: Upload Playwright traces / screenshots
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-test-results
          path: apps/web/test-results
          retention-days: 14
