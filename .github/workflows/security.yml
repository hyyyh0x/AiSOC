name: Security

# Phase 2 supply-chain + truth gates. Complements the existing codeql.yml
# (SAST), security-audit.yml (dependency CVEs), and scorecard.yml.
#
# Enforcement policy (honest ratchet):
#   - HARD gate (fails the build): the claim-to-gate matrix ratchet. A new
#     ungated marketing claim must never merge.
#   - OBSERVE gates (report, do not fail yet): gitleaks, Semgrep, Trivy,
#     checkov/tfsec. These scan a ~200k-line pre-existing codebase (with test
#     fixtures / demo placeholders); we surface findings on every PR and
#     ratchet them to blocking once a baseline is triaged into
#     .security/allowlist.yml (gitleaks: .gitleaksignore). Flipping
#     continue-on-error to false is the tracked Phase 2 continuation.
#     GitHub native push-protection remains the always-on hard secret gate.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  # ── HARD: every marketing claim maps to a gate (ratchet) ──────────────────
  claim-gate-matrix:
    name: Claim-to-gate matrix (ratchet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Enforce no new NO GATE rows
        run: python3 scripts/check_claim_gate_matrix.py

  # ── OBSERVE: secret scan (report; ratchet to blocking after triage) ───────
  secret-scan:
    name: Secret scan (gitleaks, observe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan working tree (respects .gitleaksignore)
        continue-on-error: true
        run: gitleaks dir . --redact --exit-code 1 --no-banner

  # ── OBSERVE: SAST beyond CodeQL ───────────────────────────────────────────
  semgrep:
    name: Semgrep (observe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install --quiet semgrep
      - name: Scan
        continue-on-error: true
        run: |
          semgrep --error --disable-version-check \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/typescript \
            --config p/react \
            --exclude plans/ \
            services/ apps/ packages/ scripts/

  # ── OBSERVE: filesystem vuln scan (complements dependency SCA) ────────────
  trivy-fs:
    name: Trivy filesystem (observe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install & run Trivy (report-only)
        continue-on-error: true
        run: |
          set -uo pipefail
          VERSION=0.55.2
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C /tmp trivy
          /tmp/trivy fs --severity HIGH,CRITICAL --ignore-unfixed --skip-dirs plans --exit-code 0 .

  # ── OBSERVE: IaC misconfig scan ───────────────────────────────────────────
  iac-scan:
    name: IaC scan (checkov + tfsec, observe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: checkov (terraform + helm)
        continue-on-error: true
        run: |
          pip install --quiet checkov
          checkov -d infra/terraform --quiet --compact || true
          checkov -d infra/helm --quiet --compact || true
      - name: tfsec (terraform)
        continue-on-error: true
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: infra/terraform
