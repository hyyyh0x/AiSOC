name: aisoc-cli · publish to npm

# Publishes the `aisoc` wedge CLI to npm with build provenance
# (https://docs.npmjs.com/generating-provenance-statements). Triggered by a
# `cli-v*` tag so the CLI can release independently of the service images (which
# ship on `v*` via release.yml).
#
# Requires the `NPM_TOKEN` repository secret (an npm automation token for the
# `aisoc` package). Until that is configured the job no-ops with a clear notice
# rather than failing — we never fake a publish.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack only, do not publish'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + publish (provenance)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#cli-v}"
          pkg=$(node -p "require('./packages/aisoc-lite/package.json').version")
          echo "tag=$tag pkg=$pkg"
          test "$tag" = "$pkg" || (echo "::error::tag cli-v$tag != package.json $pkg"; exit 1)

      - name: Build + test
        run: |
          pnpm --filter @aisoc/report-card build
          pnpm --filter aisoc test
          pnpm --filter aisoc build

      - name: Pack (always) for artifact inspection
        working-directory: packages/aisoc-lite
        run: npm pack

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aisoc-npm-tarball
          path: packages/aisoc-lite/*.tgz

      - name: Publish to npm with provenance
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/cli-v') }}
        working-directory: packages/aisoc-lite
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN not configured — skipping publish (tarball uploaded as an artifact). Configure the secret to enable automated publish."
            exit 0
          fi
          npm publish --provenance --access public
