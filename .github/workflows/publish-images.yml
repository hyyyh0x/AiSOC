name: Publish Images

# Build and push GHCR images for every push to main, plus on manual dispatch.
# This keeps the `:main` and `:latest` tags fresh so `pnpm aisoc:demo` can
# pull prebuilt images instead of building from source.
#
# Tagged releases are handled by release.yml.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  # Keyless cosign signing + SLSA provenance attestation need an OIDC token.
  id-token: write

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Demo-stack images (must always be fresh; pnpm aisoc:demo pulls these by tag).
          - service: api
            context: services/api
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-core-api
          - service: agents
            context: services/agents
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-agents
          - service: realtime
            context: services/realtime
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-realtime
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/beenuar/aisoc-web

          # Full-stack backend images. Published so `docker compose up -d` can
          # pull instead of build (with `pull_policy: missing`), shaving the
          # cold-start time from ~15 min to ~90 s on a fresh clone.
          - service: ingest
            context: services/ingest
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-ingest
          - service: enrichment
            context: services/enrichment
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-enrichment
          - service: fusion
            context: services/fusion
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-fusion
          - service: actions
            context: services/actions
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-actions
          - service: connectors
            context: services/connectors
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-connectors
          - service: threatintel
            context: services/threatintel
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-threatintel
          - service: ueba
            context: services/ueba
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-ueba
          - service: slack-bot
            context: services/slack-bot
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-slack-bot
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      # Web image needs NEXT_PUBLIC_DEMO_* flags baked in at build time so
      # the published ghcr.io/beenuar/aisoc-web image used by `pnpm aisoc:demo`
      # ships a bundle that knows it's a demo (banner, auto-login, deeplink).
      # Without these the bundle has empty strings → demo affordances no-op
      # and visitors get bounced to /login on first navigation. Other images
      # (api/agents/realtime) gate demo behavior at runtime via AISOC_DEMO_MODE
      # so they don't need build args. The Dockerfile already defaults these
      # to demo values; setting them here is explicit-is-better-than-implicit.
      - id: web-build-args
        if: matrix.service == 'web'
        run: |
          {
            echo 'build_args<<EOF'
            echo 'NEXT_PUBLIC_DEMO_MODE=true'
            echo 'NEXT_PUBLIC_DEMO_DEEPLINK=/cases/INC-RT-001?tab=ledger'
            echo 'NEXT_PUBLIC_DEMO_BANNER=Demo data resets daily at 00:00 UTC. All write actions are disabled.'
            echo 'NEXT_PUBLIC_DEMO_AUTOLOGIN_EMAIL=demo@tryaisoc.com'
            echo 'NEXT_PUBLIC_DEMO_AUTOLOGIN_PASSWORD=aisoc-demo'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.web-build-args.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64
          # SLSA provenance + SPDX SBOM attached to the image by BuildKit.
          provenance: mode=max
          sbom: true

      # ── Supply-chain attestation (Phase 2 continuation) ──────────────────
      # 1. cosign keyless (OIDC) signature over the pushed digest.
      # 2. CycloneDX SBOM generated by syft and attached as a cosign
      #    attestation, so users can `cosign verify-attestation --type
      #    cyclonedx` without pulling the image.
      # Verification commands: docs/operations/verifying-releases.md.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.18.1

      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${{ matrix.image }}@${DIGEST}"

      - name: Attach CycloneDX SBOM attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${{ matrix.image }}@${DIGEST}" -o cyclonedx-json > /tmp/sbom.cdx.json
          cosign attest --yes \
            --type cyclonedx \
            --predicate /tmp/sbom.cdx.json \
            "${{ matrix.image }}@${DIGEST}"
