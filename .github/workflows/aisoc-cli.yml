name: aisoc-cli · build, test, demo e2e

# Gates the `npx aisoc` wedge CLI (packages/aisoc-lite, published to npm as
# `aisoc`). The demo path in the README top fold — `npx aisoc triage --demo` —
# is run end-to-end here on a clean runner so a red badge means the wow is
# broken.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/aisoc-lite/**'
      - '.github/workflows/aisoc-cli.yml'
  push:
    branches: [main]
    paths:
      - 'packages/aisoc-lite/**'
      - '.github/workflows/aisoc-cli.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aisoc-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build · typecheck · unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Fixture is up to date (regenerate and diff)
        run: |
          node packages/aisoc-lite/scripts/gen-fixtures.mjs
          git diff --exit-code packages/aisoc-lite/src/fixtures/demo-alerts.json \
            || (echo "::error::demo fixture is stale — run 'pnpm --filter aisoc gen:fixtures' and commit"; exit 1)
      - run: pnpm --filter aisoc typecheck
      - run: pnpm --filter aisoc test
      - run: pnpm --filter aisoc build

  demo-e2e:
    name: demo cold-run (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-test
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter aisoc build
      - name: triage --demo finishes fast with the documented headline
        run: |
          set -euo pipefail
          cd packages/aisoc-lite
          start=$(date +%s)
          out=$(node dist/cli.js triage --demo --no-telemetry)
          end=$(date +%s)
          echo "$out"
          echo "elapsed: $((end - start))s"
          echo "$out" | grep -q "12 TP, 171 FP suppressed (85.5% noise), 17 need review" \
            || (echo "::error::demo headline drifted"; exit 1)
          test $((end - start)) -lt 60 || (echo "::error::demo took >= 60s"; exit 1)
      - name: JSON output is well-formed
        run: |
          set -euo pipefail
          cd packages/aisoc-lite
          node dist/cli.js triage --demo --json --no-telemetry \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0));if(d.summary.total!==200)process.exit(1)"
      - name: translate produces every dialect deterministically (no LLM key)
        run: |
          set -euo pipefail
          cd packages/aisoc-lite
          echo 'CommandLine|contains: mimikatz' \
            | node dist/cli.js translate --from sigma --to spl,kql,esql --json \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0));if(d.results.length!==3)process.exit(1)"
