name: 90s demo screencast (record)

# Phase 4.3 / T6.4 — recording side of the public demo flow. The shot
# list this workflow follows lives at
# `docs/demo/SCREENCAST_SHOTLIST.md`; the Playwright runner that
# executes the shots lives at
# `apps/web/e2e/demo/screencast.spec.ts`.
#
# Manual-trigger only by design: recording a screencast on every push
# would burn minutes for no value, and product/marketing review every
# cut before it ships to the marketing surface anyway.

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to record against (defaults to the latest preview)"
        required: false
        type: string
        default: "https://tryaisoc.com"
      release_tag:
        description: "Optional release tag; if set, the recording is uploaded as a release asset"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: screencast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  record:
    name: Record 90s demo
    runs-on: ubuntu-latest
    # Hard 15-minute ceiling — a runaway recorder should fail fast.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright + ffmpeg
        working-directory: apps/web
        run: |
          pnpm exec playwright install --with-deps chromium
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Run the screencast spec
        working-directory: apps/web
        env:
          AISOC_SCREENCAST_URL: ${{ inputs.target_url || 'https://tryaisoc.com' }}
          # Disable any analytics injection so the recorder browser
          # doesn't render a cookie banner in the final cut.
          AISOC_DISABLE_ANALYTICS: "1"
        run: |
          mkdir -p ../../tmp/screencast
          # The spec writes the raw .webm + poster.png to tmp/screencast/.
          # `--video=on` is set inside the spec, not via CLI, so the
          # codec config (1080p, 30fps) stays version-controlled.
          pnpm exec playwright test demo/screencast.spec.ts \
            --reporter=line \
            --output=../../tmp/screencast

      - name: Transcode webm → mp4 (H.264 / AAC)
        run: |
          set -euo pipefail
          src=$(find tmp/screencast -name '*.webm' | head -n1)
          if [[ -z "$src" ]]; then
            echo "::error::No .webm produced by Playwright run"
            exit 1
          fi
          # H.264 + AAC keeps the file playable in every browser that
          # supports <video>. The poster image is whatever PNG the spec
          # captured at the cover frame.
          ffmpeg -y -i "$src" \
            -c:v libx264 -preset slow -crf 22 \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            tmp/screencast/demo.mp4
          ls -lh tmp/screencast/

      - name: Upload screencast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screencast-${{ github.sha }}
          path: |
            tmp/screencast/demo.mp4
            tmp/screencast/*.png
          retention-days: 30

      - name: Attach to release (when release_tag set)
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # If the tag exists, attach the mp4 + poster as release assets.
          # We never *create* the release here; if the tag is missing
          # we fail loudly so the operator doesn't silently lose the
          # recording.
          if ! gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ inputs.release_tag }} not found"
            exit 1
          fi
          gh release upload "${{ inputs.release_tag }}" \
            tmp/screencast/demo.mp4\#"AiSOC 90s demo (mp4)" \
            tmp/screencast/*.png \
            --clobber
