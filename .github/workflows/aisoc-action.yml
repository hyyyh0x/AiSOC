name: aisoc-action · build, test, dist-freshness

# Gates the GitHub Action at packages/aisoc-action. Because a JS action runs the
# committed dist/index.js directly, this workflow also asserts the checked-in
# bundle matches a fresh build (so a contributor can't forget to rebuild) and
# that the vendored verdict engine is in sync with its source.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/aisoc-action/**'
      - 'packages/aisoc-lite/src/verdict/**'
      - 'packages/report-card/**'
      - 'scripts/sync_vendored_verdict.py'
      - '.github/workflows/aisoc-action.yml'
  push:
    branches: [main]
    paths:
      - 'packages/aisoc-action/**'
      - '.github/workflows/aisoc-action.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aisoc-action-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile

      - name: Vendored verdict engine is in sync
        run: python3 scripts/sync_vendored_verdict.py --check

      - run: pnpm --filter @aisoc/report-card build
      - run: pnpm --filter @aisoc/action typecheck
      - run: pnpm --filter @aisoc/action test

      - name: Committed dist matches a fresh build
        run: |
          pnpm --filter @aisoc/action build
          git diff --exit-code packages/aisoc-action/dist/ \
            || (echo "::error::packages/aisoc-action/dist is stale — run 'pnpm --filter @aisoc/action build' and commit"; exit 1)
