name: Tenant Isolation (live containers)

# Phase 3.4 (world-class program) — the live-container half of the cross-store
# tenant-isolation gate. The offline half (isolation.yml) proves each read path
# *constructs* a tenant scope; this job proves the scope actually isolates
# against real datastores by seeding tenant A + B and asserting a read as A
# returns zero B data. ClickHouse runs the production lake_sql rewriter against
# a live warehouse. A leak fails the build.

on:
  push:
    branches: [main]
    paths:
      - "tests/isolation/**"
      - "services/api/app/services/lake_sql.py"
      - "services/ingest/internal/graph_ws/**"
      - ".github/workflows/isolation-live.yml"
  pull_request:
    paths:
      - "tests/isolation/**"
      - "services/api/app/services/lake_sql.py"
      - "services/ingest/internal/graph_ws/**"
      - ".github/workflows/isolation-live.yml"
  workflow_dispatch:

concurrency:
  group: isolation-live-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-isolation:
    name: Cross-store isolation (Neo4j + Redis + ClickHouse + Kafka)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install clients + test deps
        # sqlglot MUST be pinned to the same range the API service ships
        # (`>=23,<27`): the ClickHouse test runs the production
        # lake_sql.rewrite_for_tenant, and sqlglot >= 27 silently stops
        # injecting the tenant WHERE predicate (the tenant-isolation break this
        # very gate exists to catch). test_lake_sql.py guards the pin itself.
        run: >-
          pip install --quiet
          pytest pytest-asyncio structlog "sqlglot>=23,<27"
          neo4j "redis>=5,<6" clickhouse-driver "kafka-python>=2,<3"

      # Single-container stores run as `services:`-style `docker run` so we can
      # pass the commands the images need (Redpanda especially). Same pattern as
      # integration.yml's MinIO step.
      - name: Start Redis
        run: docker run -d --name iso-redis -p 6379:6379 redis:7-alpine

      - name: Start Neo4j
        run: |
          docker run -d --name iso-neo4j -p 7687:7687 \
            -e NEO4J_AUTH=neo4j/testpassword123 \
            -e NEO4J_dbms_security_auth__minimum__password__length=8 \
            neo4j:5.15-community

      - name: Start ClickHouse
        run: |
          docker run -d --name iso-clickhouse -p 9000:9000 \
            --ulimit nofile=262144:262144 \
            clickhouse/clickhouse-server:23.8

      - name: Start Redpanda (Kafka API)
        run: |
          docker run -d --name iso-redpanda -p 9092:9092 \
            redpandadata/redpanda:v24.2.7 \
            redpanda start --mode dev-container --smp 1 \
            --kafka-addr PLAINTEXT://0.0.0.0:9092 \
            --advertise-kafka-addr PLAINTEXT://127.0.0.1:9092

      - name: Wait for stores to accept connections
        run: |
          set -euo pipefail
          echo "── redis ──"
          for i in $(seq 1 30); do
            docker exec iso-redis redis-cli ping 2>/dev/null | grep -q PONG && { echo "redis ready (${i}s)"; break; }
            sleep 1
          done
          echo "── clickhouse ──"
          for i in $(seq 1 60); do
            docker exec iso-clickhouse clickhouse-client --query "SELECT 1" 2>/dev/null | grep -q 1 && { echo "clickhouse ready (${i}s)"; break; }
            sleep 1
          done
          echo "── neo4j ──"
          for i in $(seq 1 60); do
            docker exec iso-neo4j cypher-shell -u neo4j -p testpassword123 "RETURN 1" >/dev/null 2>&1 && { echo "neo4j ready (${i}s)"; break; }
            sleep 1
          done
          echo "── redpanda ──"
          for i in $(seq 1 45); do
            docker exec iso-redpanda rpk cluster health 2>/dev/null | grep -q "Healthy:.*true" && { echo "redpanda ready (${i}s)"; break; }
            sleep 1
          done

      - name: Run live isolation replay
        env:
          ISOLATION_REDIS_URL: redis://localhost:6379/0
          ISOLATION_NEO4J_URI: bolt://localhost:7687
          ISOLATION_NEO4J_USER: neo4j
          ISOLATION_NEO4J_PASSWORD: testpassword123
          ISOLATION_CLICKHOUSE_HOST: localhost
          ISOLATION_CLICKHOUSE_PORT: "9000"
          ISOLATION_KAFKA_BROKERS: localhost:9092
        run: python -m pytest tests/isolation/test_live_stores.py -v --tb=short

      - name: Capture forensics on failure
        if: failure()
        run: |
          docker logs --tail=60 iso-clickhouse || true
          docker logs --tail=60 iso-neo4j || true
          docker logs --tail=40 iso-redpanda || true

      - name: Teardown
        if: always()
        run: docker rm -f iso-redis iso-neo4j iso-clickhouse iso-redpanda || true
