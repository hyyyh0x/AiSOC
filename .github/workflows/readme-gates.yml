name: README · onramp gates

# This workflow is the contract behind the AiSOC GitHub front door. Every
# claim the README makes about quick-win paths gets gated here:
#
#   1. README must stay ≤ 250 lines so visitors hit the value props before
#      they scroll off the page.
#   2. Every npm / PyPI package the README directs visitors to must
#      either resolve on the public registry today, or be paired with a
#      "Coming in v8.0" guard.
#   3. Any `apps/web/public/demo/<asset>` path the README points at must
#      exist on disk (or be paired with the same kind of guard).
#   4. `aisoc-sandbox demo --scenario <each>` must run to completion
#      offline on both Linux and macOS — that's the README's
#      "Try AiSOC in 60 seconds, no Docker" promise.
#
# Gates 1–3 share a single Python driver at scripts/readme_gates.py so
# contributors can reproduce the same checks locally with one command.
# Gate 4 needs the cross-platform matrix, so it runs separately.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'packages/aisoc-sandbox/**'
      - 'apps/web/public/demo/**'
      - 'scripts/readme_gates.py'
      - '.github/workflows/readme-gates.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'packages/aisoc-sandbox/**'
      - 'apps/web/public/demo/**'
      - 'scripts/readme_gates.py'
      - '.github/workflows/readme-gates.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: readme-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: README · static gates (line-count, packages, demo assets)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run scripts/readme_gates.py
        run: |
          python3 scripts/readme_gates.py --skip-sandbox

  sandbox-offline:
    name: aisoc-sandbox · offline smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install aisoc-sandbox from source
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e packages/aisoc-sandbox

      - name: Smoke-test each bundled scenario
        run: |
          set -euo pipefail
          for s in lateral-movement aws-credential-exfil phishing-payload kubernetes-privesc github-token-theft; do
            echo "── $s ──"
            out=$(aisoc-sandbox demo --scenario "$s" --json)
            python3 -c "
          import json, sys
          payload = json.loads(sys.argv[1])
          steps = payload['ledger']
          assert len(steps) == 4, f'expected 4 steps, got {len(steps)}'
          assert steps[0]['agent'] == 'DetectAgent', steps[0]
          assert steps[-1]['agent'] == 'RespondAgent', steps[-1]
          print(f\"  {len(steps)} steps · final-agent={steps[-1]['agent']}\")
          " "$out"
          done

      - name: Run sandbox unit tests
        run: |
          python3 -m pip install pytest
          cd packages/aisoc-sandbox
          PYTHONPATH=src python3 -m pytest tests/ -q
