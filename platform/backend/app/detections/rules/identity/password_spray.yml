title: Password Spray Against Many Users
id: aisoc-id-id-0022-password-spray
status: stable
description: |
  A single source attempts authentication against a large number
  of distinct user accounts in a short window with a small number
  of password guesses per account — classic password spray.
author: Cyble AiSOC
level: high
logsource:
  category: authentication
tags:
  - attack.t1110.003
  - attack.credential_access
  - aisoc.identity
detection:
  selection:
    event.outcome: 'failure'
    event.action:
      - 'login'
      - 'signin'
      - 'UserLoginFailed'
  spray:
    enrich.spray.unique_users|gte: 20
  condition: selection and spray
