title: GCP Service Account Key Created
id: aisoc-id-cl-0013-gcp-sa-key
status: stable
description: |
  New user-managed service-account key created. Long-lived JSON keys
  are a major exfiltration target and discouraged by Google security
  best-practice — every creation should be reviewed.
author: Cyble AiSOC
level: medium
logsource:
  product: gcp
  service: audit
tags:
  - attack.t1098.001
  - attack.persistence
  - aisoc.cloud
detection:
  selection:
    event.module: gcp
    gcp.audit.method_name: 'google.iam.admin.v1.CreateServiceAccountKey'
  condition: selection
