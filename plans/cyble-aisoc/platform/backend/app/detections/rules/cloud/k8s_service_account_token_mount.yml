title: Kubernetes Pod Mounts Service Account Token in Unusual Namespace
id: aisoc-id-cl-0015-k8s-sa-token
status: experimental
description: |
  Pod created with automountServiceAccountToken explicitly enabled in
  a namespace that normally disables it — indicates an attacker is
  staging a workload to pivot using the SA token.
author: Cyble AiSOC
level: medium
logsource:
  product: kubernetes
  service: audit
tags:
  - attack.t1552.007
  - attack.credential_access
  - aisoc.cloud
detection:
  selection:
    event.module: kubernetes
    kubernetes.audit.verb: 'create'
    kubernetes.audit.object_ref.resource: 'pods'
  token_mounted:
    kubernetes.audit.request_object.spec.automountServiceAccountToken: true
  suspicious_ns:
    enrich.k8s.namespace.default_automount: false
  condition: selection and token_mounted and suspicious_ns
