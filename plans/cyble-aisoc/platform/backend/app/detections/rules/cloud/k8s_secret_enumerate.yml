title: Kubernetes Mass Secret Enumeration
id: aisoc-id-cl-0020-k8s-secret-enum
status: experimental
description: |
  Single principal lists or reads a large number of secrets across
  namespaces in a short window — strong indicator of credential
  harvesting after cluster compromise.
author: Cyble AiSOC
level: high
logsource:
  product: k8s
  service: audit
tags:
  - attack.t1552.007
  - attack.credential_access
  - aisoc.cloud
detection:
  selection:
    event.module: k8s.audit
    k8s.verb:
      - 'list'
      - 'get'
    k8s.resource: 'secrets'
  threshold:
    enrich.k8s.secret_reads_5m|gte: 25
  condition: selection and threshold
