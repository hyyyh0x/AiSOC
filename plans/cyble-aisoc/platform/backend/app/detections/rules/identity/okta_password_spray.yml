title: Okta Password Spray
id: aisoc-id-0009-okta-password-spray
status: stable
description: |
  Single source attempting authentication against many usernames with
  a low failure rate per user (classic spray vs brute-force).
author: Cyble AiSOC
level: high
logsource:
  product: okta
  service: system
tags:
  - attack.t1110.003
  - attack.credential_access
  - aisoc.identity
detection:
  selection:
    event.module: okta
    event.action: 'user.authentication.auth_via_mfa'
    event.outcome: failure
    enrich.spray.unique_users|gte: 10
    enrich.spray.window_seconds|lte: 600
  condition: selection
