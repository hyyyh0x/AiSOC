title: Email URL Leads to Credential Phishing Page
id: aisoc-id-em-0008-cred-phish
status: stable
description: |
  Inbound email contains URL that resolves (via detonation/enrichment)
  to a credential harvesting page mimicking Microsoft/Google/Okta
  login.
author: Cyble AiSOC
level: high
logsource:
  product: email_gateway
  service: messagetrace
tags:
  - attack.t1566.002
  - attack.initial_access
  - aisoc.email
detection:
  selection:
    event.category: 'email'
    event.module: 'email_gateway'
  cred_phish:
    enrich.url.verdict: 'credential_phishing'
  condition: selection and cred_phish
