title: Office Application Spawns Command Shell
id: aisoc-id-ep-0005-office-spawn-shell
status: stable
description: |
  An Office product (Word, Excel, Outlook, PowerPoint) spawned a
  command shell or scripting host — strong macro/exploitation signal.
author: Cyble AiSOC
level: high
logsource:
  category: process_creation
  product: windows
tags:
  - attack.t1059
  - attack.execution
  - aisoc.endpoint
detection:
  parent:
    process.parent.executable|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\msaccess.exe'
  child:
    process.executable|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\bitsadmin.exe'
      - '\regsvr32.exe'
  condition: parent and child
