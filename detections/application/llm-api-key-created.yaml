id: det-application-071
name: LLM Provider API Key Created
description: AiSOC v1 curated detection. Triggers on the application signal described by 'LLM Provider
  API Key Created'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098
- tlp.white
category: application
log_source:
  product: openai
  service: audit
detection:
  condition: |
    event_type ENDSWITH ".api_key.created"
false_positives:
- Planned key rotation (change ticket)
- New service onboarding
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
