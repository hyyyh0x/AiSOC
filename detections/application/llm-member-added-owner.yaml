id: det-application-073
name: LLM Provider Owner Role Granted
description: AiSOC v1 curated detection. Triggers on the application signal described by 'LLM Provider
  Owner Role Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.003
- tlp.white
category: application
log_source:
  product: openai
  service: audit
detection:
  condition: |
    event_type ENDSWITH ".member.added"
    AND role == "owner"
false_positives:
- Approved org owner change
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
