id: det-application-072
name: LLM Provider Admin API Key Created
description: AiSOC v1 curated detection. Triggers on the application signal described by 'LLM Provider
  Admin API Key Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: application
log_source:
  product: openai
  service: audit
detection:
  condition: |
    event_type ENDSWITH ".api_key.created"
    AND key_scope == "admin"
false_positives:
- Documented break-glass admin key issuance
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
