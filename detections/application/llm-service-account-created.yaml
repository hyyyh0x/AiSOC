id: det-application-077
name: LLM Provider Service Account Created
description: AiSOC v1 curated detection. Triggers on the application signal described by 'LLM Provider
  Service Account Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1136.003
- tlp.white
category: application
log_source:
  product: openai
  service: audit
detection:
  condition: |
    event_type ENDSWITH ".service_account.created"
false_positives:
- New automation onboarding (change ticket)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
