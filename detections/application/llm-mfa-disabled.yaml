id: det-application-075
name: LLM Provider MFA Requirement Disabled
description: AiSOC v1 curated detection. Triggers on the application signal described by 'LLM Provider
  MFA Requirement Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: application
log_source:
  product: openai
  service: audit
detection:
  condition: |
    event_type CONTAINS "mfa"
    AND action == "disabled"
false_positives:
- Approved auth-policy change
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
